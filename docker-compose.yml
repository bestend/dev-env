services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        TZ: ${TZ:-Asia/Seoul}
        NODE_MAJOR: ${NODE_MAJOR:-22}
        PNPM_VERSION: ${PNPM_VERSION:-10.33.0}
        CODEX_VERSION: ${CODEX_VERSION:-0.117.0}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-2.1.86}
        CODE_SERVER_VERSION: ${CODE_SERVER_VERSION:-4.112.0}
        UV_VERSION: ${UV_VERSION:-0.10.3}
        LAZYGIT_VERSION: ${LAZYGIT_VERSION:-0.56.0}
    image: all-in-one-dev:latest
    container_name: all-in-one-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - dev-home:/home/dev
    environment:
      ENABLE_SSHD: ${ENABLE_SSHD:-false}
      ENABLE_CODE_SERVER: ${ENABLE_CODE_SERVER:-false}
      ENABLE_TMUX_PLUGIN_BOOTSTRAP: ${ENABLE_TMUX_PLUGIN_BOOTSTRAP:-true}
      CODE_SERVER_PORT: ${CODE_SERVER_PORT:-8080}
      SSH_PORT: ${SSH_PORT:-2222}
      CODE_SERVER_AUTH: ${CODE_SERVER_AUTH:-password}
      CODE_SERVER_PASSWORD: ${CODE_SERVER_PASSWORD:-changeme}
    tty: true
    stdin_open: true
    command: ["sleep", "infinity"]

  ssh:
    extends:
      service: dev
    container_name: all-in-one-dev-ssh
    environment:
      ENABLE_SSHD: "true"
      ENABLE_CODE_SERVER: "false"
    ports:
      - "${SSH_PORT:-2222}:2222"
    profiles: ["ssh"]

  code-server:
    extends:
      service: dev
    container_name: all-in-one-dev-code-server
    environment:
      ENABLE_SSHD: "false"
      ENABLE_CODE_SERVER: "true"
      CODE_SERVER_AUTH: ${CODE_SERVER_AUTH:-password}
      CODE_SERVER_PASSWORD: ${CODE_SERVER_PASSWORD:-changeme}
      CODE_SERVER_PORT: ${CODE_SERVER_PORT:-8080}
    ports:
      - "${CODE_SERVER_PORT:-8080}:8080"
    profiles: ["code-server"]

volumes:
  dev-home:
