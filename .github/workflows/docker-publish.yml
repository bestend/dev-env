name: docker-publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Static verification
        run: |
          set -euo pipefail
          ./tests/test-dev-image-layout.sh
          for f in scripts/*.sh tests/*.sh; do bash -n "$f"; done
          python3 -m json.tool .devcontainer/devcontainer.json >/dev/null
          python3 - <<'PY'
          import yaml
          for path in ['.github/workflows/docker-publish.yml']:
              with open(path) as fh:
                  yaml.safe_load(fh)
              print(f'{path} ok')
          PY

      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: bestend/dev-env:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Runtime smoke tests
        run: ./tests/test-dev-image-runtime.sh bestend/dev-env:ci-test

      - name: Service smoke tests
        run: ./tests/test-dev-image-services.sh bestend/dev-env:ci-test

  docker:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          DATE_TAG="$(date -u +'%Y%m%d%H')"
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION_TAG="${DATE_TAG}-${SHORT_SHA}"
          echo "image=docker.io/bestend/dev-env" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version_tag }}
            ${{ steps.vars.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
