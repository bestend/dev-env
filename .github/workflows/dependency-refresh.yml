name: dependency-refresh

on:
  workflow_dispatch:
  schedule:
    # 02:00 KST every day = 17:00 UTC on the previous day.
    - cron: '0 17 * * *'

concurrency:
  group: dependency-refresh-main
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML for static checks
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Update pinned dependency versions
        run: python scripts/update_dependency_versions.py

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          if git diff --quiet -- Dockerfile .env.example; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Static verification
        if: steps.diff.outputs.changed == 'true'
        run: ./tests/test-static.sh

      - name: Build local test image
        if: steps.diff.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: bestend/dev-env:deps-ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Runtime smoke tests
        if: steps.diff.outputs.changed == 'true'
        run: ./tests/test-dev-image-runtime.sh bestend/dev-env:deps-ci-test

      - name: Service smoke tests
        if: steps.diff.outputs.changed == 'true'
        run: ./tests/test-dev-image-services.sh bestend/dev-env:deps-ci-test

      - name: Commit updated versions
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Dockerfile .env.example
          git commit -m "chore: refresh pinned dependency versions"
          git push origin HEAD:main

      - name: Trigger docker publish workflow
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run docker-publish.yml --ref main

      - name: No updates found
        if: steps.diff.outputs.changed != 'true'
        run: echo 'No dependency updates found.'
